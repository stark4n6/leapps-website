name: Generate blog index

# Rebuilds blog/posts/index.json from each post's Markdown frontmatter and
# commits it back to main, so contributors never hand-edit the index. The same
# script validates frontmatter on PRs (see validate-blog.yml).
#
# Shares a concurrency group with og-cards so the two main-pushing jobs never
# run — and push — at the same time.

on:
  push:
    branches: [main]
    paths:
      - 'blog/posts/*.md'
      - 'scripts/generate_blog_index.py'
      - '.github/workflows/generate-blog-index.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: blog-main-push
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Generate blog index
        run: python3 scripts/generate_blog_index.py

      - name: Commit regenerated index
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add blog/posts/index.json
          if git diff --cached --quiet; then
            echo "Index already up to date."
          else
            git commit -m "chore: regenerate blog index"
            git pull --rebase origin main
            git push origin HEAD:main
          fi
