name: Generate blog OG cards

on:
  push:
    branches: [main]
    paths:
      - 'blog/posts/**'
      - 'tools/og-cards/**'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: og-cards
  cancel-in-progress: false

jobs:
  og-cards:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install generator deps
        working-directory: tools/og-cards
        run: npm install --no-audit --no-fund

      - name: Generate cards
        working-directory: tools/og-cards
        run: node generate.mjs

      - name: Commit any changed cards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add blog/og
          if git diff --cached --quiet; then
            echo "No card changes."
          else
            git commit -m "Regenerate blog OG cards [skip ci]"
            git push
          fi
