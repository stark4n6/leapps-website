name: Download Snapshot

on:
  schedule:
    - cron: '0 1,7,13,19 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: download-snapshot
  cancel-in-progress: false

jobs:
  snapshot:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Pull latest
        run: git pull --rebase origin main

      - name: Fetch download counts and update snapshot
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 - <<'EOF'
          import json, os, urllib.request, urllib.error
          from datetime import datetime, timezone

          REPOS = {
            'ileapp': 'abrignoni/iLEAPP',
            'aleapp': 'abrignoni/ALEAPP',
            'rleapp': 'abrignoni/RLEAPP',
            'vleapp': 'abrignoni/VLEAPP',
            'lava':   'leapps-org/LAVA-releases',
          }

          token = os.environ['GH_TOKEN']
          headers = {'Authorization': f'Bearer {token}', 'Accept': 'application/vnd.github+json'}

          def fetch_downloads(repo):
            total = 0
            page = 1
            while True:
              url = f'https://api.github.com/repos/{repo}/releases?per_page=100&page={page}'
              req = urllib.request.Request(url, headers=headers)
              with urllib.request.urlopen(req) as r:
                releases = json.loads(r.read())
              if not releases:
                break
              for release in releases:
                for asset in release.get('assets', []):
                  total += asset.get('download_count', 0)
              page += 1
            return total

          totals = {key: fetch_downloads(repo) for key, repo in REPOS.items()}

          snapshot_file = 'data/downloads.json'
          try:
            with open(snapshot_file) as f:
              data = json.load(f)
          except FileNotFoundError:
            data = {'snapshots': []}

          today = datetime.now(timezone.utc).strftime('%Y-%m-%d')
          snapshots = data.get('snapshots', [])

          # Replace today's entry if it already exists
          snapshots = [s for s in snapshots if s['date'] != today]
          snapshots.append({'date': today, 'totals': totals})

          data['snapshots'] = snapshots

          with open(snapshot_file, 'w') as f:
            json.dump(data, f, indent=2)

          print(f"Snapshot saved for {today}: {totals}")
          EOF

      - name: Commit snapshot
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/downloads.json
          if ! git diff --cached --quiet; then
            git commit -m "chore: daily download snapshot $(date -u +%Y-%m-%d)"
            git fetch origin main
            git rebase origin/main
            git push origin main
          fi
