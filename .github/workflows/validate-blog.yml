name: Validate blog manifest

# Validates a post's frontmatter and filename before merge: a URL-safe slug,
# required fields, and a valid YYYY-MM-DD date. The index itself is generated
# post-merge (see generate-blog-index.yml), so this checks the source posts,
# not index.json — a contributor never edits the index by hand.

on:
  pull_request:
    paths:
      - 'blog/posts/**'
      - 'scripts/generate_blog_index.py'
      - '.github/workflows/validate-blog.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-blog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Validate blog frontmatter
        run: python3 scripts/generate_blog_index.py --check
