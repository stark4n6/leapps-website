name: Validate blog manifest

# Fails a PR early when blog/posts/index.json and the post files disagree —
# unsafe/duplicate slugs, missing .md, a bad or missing date field, etc. — so
# a malformed blog contribution can't silently break ordering or OG cards.

on:
  pull_request:
    paths:
      - 'blog/posts/**'
      - 'tools/validate-blog.mjs'
      - '.github/workflows/validate-blog.yml'
  push:
    branches: [main]
    paths:
      - 'blog/posts/**'
      - 'tools/validate-blog.mjs'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-blog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Validate blog manifest
        run: node tools/validate-blog.mjs
