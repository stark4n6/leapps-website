<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blog — LEAPPs</title>
  <meta name="description" content="" />

  <!-- Open Graph (populated by JS) -->
  <meta property="og:type" content="article" />
  <meta property="og:site_name" content="LEAPPs" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=IBM+Plex+Mono:wght@400;500&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --gold: #F5C020;
      --gold-dk: #D4A010;
      --off-black: #0E0E0E;
      --surface: #161616;
      --border: #2C2C2C;
      --text: #F0EDE6;
      --muted: #888888;
      --font-head: 'Barlow Condensed', sans-serif;
      --font-body: 'Barlow', sans-serif;
      --font-mono: 'IBM Plex Mono', monospace;
    }
    html { scroll-behavior: smooth; }
    body {
      background: var(--off-black);
      color: var(--text);
      font-family: var(--font-body);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }
    a { color: inherit; }
    img { max-width: 100%; display: block; }

    /* Nav */
    .lp-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 2rem;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      background: rgba(14,14,14,0.96);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      z-index: 1000;
    }
    .lp-nav-logo {
      font-family: var(--font-head);
      font-size: 1.4rem;
      font-weight: 900;
      letter-spacing: .05em;
      color: var(--text);
      text-decoration: none;
    }
    .lp-nav-links {
      display: flex;
      gap: 2rem;
      list-style: none;
    }
    .lp-nav-links a {
      color: var(--muted);
      text-decoration: none;
      font-size: .875rem;
      letter-spacing: .08em;
      text-transform: uppercase;
      font-weight: 500;
      transition: color .2s;
    }
    .lp-nav-links a:hover,
    .lp-nav-links a.active { color: var(--gold); }
    .lp-nav-cta {
      background: var(--gold);
      color: var(--off-black) !important;
      padding: .5rem 1.25rem;
      font-family: var(--font-head);
      font-weight: 700;
      font-size: .9rem;
      letter-spacing: .1em;
      text-transform: uppercase;
      text-decoration: none !important;
      transition: background .2s;
    }
    .lp-nav-cta:hover { background: var(--gold-dk); }

    /* Layout */
    .post-wrap {
      max-width: 720px;
      margin: 0 auto;
      padding: 3rem 2rem 5rem;
    }

    /* Breadcrumb */
    .breadcrumb {
      font-family: var(--font-mono);
      font-size: .75rem;
      color: var(--muted);
      margin-bottom: 2rem;
      display: flex;
      align-items: center;
      gap: .5rem;
    }
    .breadcrumb a { color: var(--muted); text-decoration: none; transition: color .2s; }
    .breadcrumb a:hover { color: var(--gold); }
    .breadcrumb .sep { color: var(--border); }

    /* Post header */
    .post-header { margin-bottom: 2.5rem; }
    .post-header-meta {
      display: flex;
      align-items: center;
      gap: 1rem;
      font-family: var(--font-mono);
      font-size: .75rem;
      color: var(--muted);
      margin-bottom: 1rem;
    }
    .post-header-meta .date { color: var(--gold); }
    .post-header h1 {
      font-family: var(--font-head);
      font-size: 2.8rem;
      font-weight: 900;
      letter-spacing: .03em;
      text-transform: uppercase;
      line-height: 1.1;
      color: var(--text);
      margin-bottom: 1rem;
    }
    .post-tags {
      display: flex;
      gap: .5rem;
      flex-wrap: wrap;
    }
    .tag {
      font-family: var(--font-mono);
      font-size: .7rem;
      color: var(--muted);
      border: 1px solid var(--border);
      padding: .15rem .5rem;
      letter-spacing: .05em;
    }

    /* Divider */
    .post-divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 2rem 0;
    }

    /* Markdown body */
    .post-body { font-size: 1rem; line-height: 1.75; color: var(--text); }
    .post-body h1,
    .post-body h2,
    .post-body h3,
    .post-body h4 {
      font-family: var(--font-head);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .04em;
      color: var(--text);
      margin: 2rem 0 .75rem;
      line-height: 1.2;
    }
    .post-body h1 { font-size: 2rem; color: var(--gold); }
    .post-body h2 { font-size: 1.5rem; }
    .post-body h3 { font-size: 1.2rem; }
    .post-body p { margin-bottom: 1.25rem; }
    .post-body ul,
    .post-body ol { margin: 0 0 1.25rem 1.5rem; }
    .post-body li { margin-bottom: .4rem; }
    .post-body a { color: var(--gold); text-decoration: underline; text-underline-offset: 3px; }
    .post-body a:hover { color: var(--gold-dk); }
    .post-body code {
      font-family: var(--font-mono);
      font-size: .85em;
      background: var(--surface);
      border: 1px solid var(--border);
      padding: .15em .4em;
      color: var(--gold);
    }
    .post-body pre {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 1.25rem;
      overflow-x: auto;
      margin-bottom: 1.5rem;
    }
    .post-body pre code {
      background: none;
      border: none;
      padding: 0;
      color: var(--text);
      font-size: .85rem;
    }
    .post-body blockquote {
      border-left: 3px solid var(--gold);
      padding: .5rem 1rem;
      color: var(--muted);
      margin: 1.5rem 0;
      font-style: italic;
    }
    .post-body hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 2rem 0;
    }
    .post-body table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 1.5rem;
      font-size: .9rem;
    }
    .post-body th,
    .post-body td {
      border: 1px solid var(--border);
      padding: .6rem .875rem;
      text-align: left;
    }
    .post-body th {
      background: var(--surface);
      font-family: var(--font-head);
      font-weight: 700;
      text-transform: uppercase;
      font-size: .8rem;
      letter-spacing: .06em;
      color: var(--gold);
    }
    .post-body img {
      max-width: 100%;
      border: 1px solid var(--border);
      margin: 1.5rem 0;
    }

    /* Post footer nav */
    .post-footer-nav {
      margin-top: 3rem;
      padding-top: 2rem;
      border-top: 1px solid var(--border);
    }
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: .4rem;
      color: var(--muted);
      text-decoration: none;
      font-family: var(--font-head);
      font-size: .875rem;
      letter-spacing: .08em;
      text-transform: uppercase;
      font-weight: 600;
      transition: color .2s;
    }
    .back-link:hover { color: var(--gold); }

    /* Loading / error */
    .state-msg {
      text-align: center;
      padding: 4rem 0;
      color: var(--muted);
      font-family: var(--font-mono);
      font-size: .875rem;
    }
    .state-msg .icon { font-size: 2rem; margin-bottom: 1rem; color: var(--gold); }

    /* Footer */
    .lp-footer {
      border-top: 1px solid var(--border);
      padding: 2rem;
      text-align: center;
      font-size: .8rem;
      color: var(--muted);
      font-family: var(--font-mono);
    }
    .lp-footer a { color: var(--muted); text-decoration: none; }
    .lp-footer a:hover { color: var(--gold); }

    .lp-hamburger { display: none; flex-direction: column; justify-content: center; gap: 5px; width: 36px; height: 36px; cursor: pointer; background: none; border: none; padding: 4px; }
    .lp-hamburger span { display: block; width: 100%; height: 2px; background: var(--text); transition: transform .25s, opacity .25s; transform-origin: center; }
    .lp-hamburger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
    .lp-hamburger.open span:nth-child(2) { opacity: 0; }
    .lp-hamburger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }
    .lp-mobile-menu { display: none; position: fixed; top: 57px; left: 0; right: 0; background: rgba(14,14,14,.98); backdrop-filter: blur(8px); border-bottom: 1px solid var(--border); z-index: 999; padding: 1rem 2rem 1.5rem; flex-direction: column; gap: .25rem; }
    .lp-mobile-menu.open { display: flex; }
    .lp-mobile-menu a { color: var(--muted); text-decoration: none; font-size: 1rem; letter-spacing: .08em; text-transform: uppercase; font-weight: 500; padding: .75rem 0; border-bottom: 1px solid var(--border); transition: color .2s; }
    .lp-mobile-menu a:last-child { border-bottom: none; }
    .lp-mobile-menu a:hover { color: var(--gold); }
    @media (max-width: 640px) {
      .lp-nav-links { display: none; }
      .lp-hamburger { display: flex; }
      .post-header h1 { font-size: 2rem; }
    }
  </style>
</head>
<body>

  <nav class="lp-nav">
    <a href="https://leapps.org/" class="lp-nav-logo">LEAPPs</a>
    <ul class="lp-nav-links">
      <li><a href="https://leapps.org/">Home</a></li>
      <li><a href="https://leapps.org/releases">Releases</a></li>
      <li><a href="https://leapps.org/artifacts">Artifacts</a></li>
      <li><a href="https://leapps.org/stats">Stats</a></li>
      <li><a href="https://leapps.org/changelog">Changelog</a></li>
      <li><a href="https://leapps.org/blog" class="active">Blog</a></li>
      <li><a href="https://leapps.org/resources">Resources</a></li>
      <li><a href="https://github.com/abrignoni" target="_blank" rel="noopener">GitHub</a></li>
    </ul>
    <a href="https://leapps.org/#download" class="lp-nav-cta">Get Tools</a>
    <button class="lp-hamburger" id="lp-hamburger" aria-label="Open menu">
      <span></span><span></span><span></span>
    </button>
  </nav>
  <div class="lp-mobile-menu" id="lp-mobile-menu">
    <a href="https://leapps.org#tools" onclick="closeMobileMenu()">Tools</a>
    <a href="https://leapps.org#lava" onclick="closeMobileMenu()">LAVA</a>
    <a href="https://leapps.org/releases" onclick="closeMobileMenu()">Releases</a>
    <a href="https://leapps.org/stats" onclick="closeMobileMenu()">Stats</a>
    <a href="https://leapps.org/changelog" onclick="closeMobileMenu()">Changelog</a>
    <a href="https://leapps.org/artifacts" onclick="closeMobileMenu()">Artifacts</a>
    <a href="https://leapps.org#faq" onclick="closeMobileMenu()">FAQ</a>
    <a href="https://leapps.org#mentions" onclick="closeMobileMenu()">Featured</a>
    <a href="https://leapps.org#contributors" onclick="closeMobileMenu()">Contributors</a>
    <a href="https://leapps.org/scoreboard" onclick="closeMobileMenu()">Scoreboard</a>
    <a href="https://leapps.org#mailing" onclick="closeMobileMenu()">Mailing List</a>
    <a href="https://leapps.org/resources" onclick="closeMobileMenu()">Resources</a>
    <a href="https://leapps.org/blog" onclick="closeMobileMenu()">Blog</a>
    <a href="https://github.com/abrignoni" target="_blank" rel="noopener" onclick="closeMobileMenu()">GitHub</a>
  </div>

  <main class="post-wrap">
    <div class="breadcrumb">
      <a href="https://leapps.org/blog">Blog</a>
      <span class="sep">/</span>
      <span id="breadcrumb-title">…</span>
    </div>

    <div id="post-content">
      <div class="state-msg">
        <div class="icon"><i class="ti ti-loader-2"></i></div>
        Loading post…
      </div>
    </div>
  </main>

  <footer class="lp-footer">
    <p>LEAPPs &copy; <span id="yr"></span> &mdash; <a href="https://leapps.org/">leapps.org</a> &mdash; <a href="https://github.com/abrignoni" target="_blank" rel="noopener">GitHub</a></p>
  </footer>

  <!-- marked.js for Markdown rendering -->
  <script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
  <script>
    document.getElementById('yr').textContent = new Date().getFullYear();

    const WORKER = 'https://leapps-api.4n6-198.workers.dev';

    function formatDate(iso) {
      const d = new Date(iso + 'T00:00:00');
      return d.toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
    }

    // Strip YAML frontmatter from markdown
    function stripFrontmatter(md) {
      return md.replace(/^---[\s\S]*?---\n?/, '');
    }

    // Parse frontmatter key: value pairs
    function parseFrontmatter(md) {
      const match = md.match(/^---\n([\s\S]*?)\n---/);
      if (!match) return {};
      const meta = {};
      match[1].split('\n').forEach(line => {
        const idx = line.indexOf(':');
        if (idx === -1) return;
        const key = line.slice(0, idx).trim();
        let val = line.slice(idx + 1).trim();
        // Parse array syntax: [a, b, c]
        if (val.startsWith('[') && val.endsWith(']')) {
          val = val.slice(1, -1).split(',').map(s => s.trim()).filter(Boolean);
        }
        meta[key] = val;
      });
      return meta;
    }

    async function loadPost() {
      const container = document.getElementById('post-content');
      const params = new URLSearchParams(window.location.search);
      const slug = params.get('post');

      if (!slug || !slug.match(/^[\w-]+$/)) {
        container.innerHTML = `
          <div class="state-msg">
            <div class="icon"><i class="ti ti-alert-triangle"></i></div>
            Post not found. <a href="https://leapps.org/blog" style="color:var(--gold)">Back to Blog</a>
          </div>`;
        return;
      }

      try {
        const res = await fetch(`${WORKER}/blog/posts/${encodeURIComponent(slug)}.md`);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const raw = await res.text();

        const meta = parseFrontmatter(raw);
        const body = stripFrontmatter(raw);
        const html = marked.parse(body);

        // Update page title & OG
        const title = meta.title || slug;
        document.title = `${title} — LEAPPs Blog`;
        document.querySelector('meta[name="description"]').setAttribute('content', meta.excerpt || '');
        document.getElementById('breadcrumb-title').textContent = title;

        const tagsHtml = meta.tags && meta.tags.length
          ? `<div class="post-tags">${(Array.isArray(meta.tags) ? meta.tags : [meta.tags]).map(t => `<span class="tag">${t}</span>`).join('')}</div>`
          : '';

        container.innerHTML = `
          <header class="post-header">
            <div class="post-header-meta">
              ${meta.date ? `<span class="date">${formatDate(meta.date)}</span>` : ''}
              ${meta.author ? `<span>${meta.author}</span>` : ''}
            </div>
            <h1>${title}</h1>
            ${tagsHtml}
          </header>
          <hr class="post-divider" />
          <article class="post-body">${html}</article>
          <nav class="post-footer-nav">
            <a href="https://leapps.org/blog" class="back-link">
              <i class="ti ti-arrow-left"></i> All Posts
            </a>
          </nav>`;
      } catch (err) {
        container.innerHTML = `
          <div class="state-msg">
            <div class="icon"><i class="ti ti-alert-triangle"></i></div>
            Failed to load post. <a href="https://leapps.org/blog" style="color:var(--gold)">Back to Blog</a>
          </div>`;
        console.error('Post load error:', err);
      }
    }

    loadPost();

    // Mobile menu
    const hamburger = document.getElementById('lp-hamburger');
    const mobileMenu = document.getElementById('lp-mobile-menu');
    hamburger.addEventListener('click', () => { hamburger.classList.toggle('open'); mobileMenu.classList.toggle('open'); });
    function closeMobileMenu() { hamburger.classList.remove('open'); mobileMenu.classList.remove('open'); }
    document.addEventListener('click', e => { if (!hamburger.contains(e.target) && !mobileMenu.contains(e.target)) closeMobileMenu(); });
  </script>
</body>
</html>
